kind = "web"
previewPath = "/"
title = "Script to Image Finder"
version = "1.0.0"
id = "artifacts/script-to-image"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24838

[services.development]
run = "pnpm --filter @workspace/script-to-image run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/script-to-image", "run", "build" ]
publicDir = "artifacts/script-to-image/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24838"
BASE_PATH = "/"
