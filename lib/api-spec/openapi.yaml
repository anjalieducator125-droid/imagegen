openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Script to Image Finder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: images
    description: Image search operations
  - name: settings
    description: App settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /images/search:
    post:
      operationId: searchImages
      tags: [images]
      summary: Search images for a script line with AI-powered query generation
      description: >
        Detects the language, translates to English if needed, generates an
        optimized search query, searches all configured providers in parallel,
        scores results and returns the best images.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageSearchInput"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageSearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /images/settings:
    get:
      operationId: getImageSettings
      tags: [settings]
      summary: Get available image providers and settings
      responses:
        "200":
          description: Available settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ImageSearchInput:
      type: object
      required: [lineNumber, lineText]
      properties:
        lineNumber:
          type: integer
          description: The line number in the script
        lineText:
          type: string
          description: The original script line text (any language)
        provider:
          type: string
          description: "Provider preference: auto (best), google, unsplash, pixabay, pexels"
          default: auto
        perPage:
          type: integer
          description: Number of images to return
          default: 4
          minimum: 1
          maximum: 8
        orientation:
          type: string
          description: Image orientation preference
          enum: [landscape, portrait, square]
          default: landscape
        safeSearch:
          type: boolean
          description: Whether to enable safe search
          default: true

    ScriptLineAnalysis:
      type: object
      required: [detectedLanguage, englishQuery]
      properties:
        detectedLanguage:
          type: string
          description: Detected language code (e.g. "hi", "en")
        detectedLanguageName:
          type: string
          description: Human-readable language name
        translatedText:
          type: ["string", "null"]
          description: English translation of the original text (null if already English)
        englishQuery:
          type: string
          description: Optimized English search query generated from the line
        subject:
          type: ["string", "null"]
          description: Main subject of the scene
        action:
          type: ["string", "null"]
          description: Main action or activity
        location:
          type: ["string", "null"]
          description: Location or setting
        objects:
          type: ["string", "null"]
          description: Key objects in the scene
        emotion:
          type: ["string", "null"]
          description: Mood or emotion of the scene
        timeOfDay:
          type: ["string", "null"]
          description: Time of day if detectable

    ImageResult:
      type: object
      required: [id, url, thumbnailUrl, photographer, photographerUrl, source, width, height, score]
      properties:
        id:
          type: string
        url:
          type: string
          description: Full resolution image URL
        thumbnailUrl:
          type: string
          description: Thumbnail URL for display
        mediumUrl:
          type: string
          description: Medium resolution URL
        photographer:
          type: string
        photographerUrl:
          type: string
        source:
          type: string
          description: Provider name (google, unsplash, pixabay, pexels)
        width:
          type: integer
        height:
          type: integer
        alt:
          type: ["string", "null"]
          description: Alt text for the image
        score:
          type: number
          description: Relevance score 0-100

    ProviderDebugInfo:
      type: object
      required: [provider, query, requestUrl, rawCount, filteredCount, executionMs]
      properties:
        provider:
          type: string
          description: Provider name (google, unsplash, pixabay, pexels)
        query:
          type: string
          description: Exact query string sent to the provider
        requestUrl:
          type: string
          description: Full request URL with API key redacted
        rawCount:
          type: integer
          description: Number of images returned by the provider before filtering
        filteredCount:
          type: integer
          description: Number of images remaining after deduplication and filtering
        executionMs:
          type: number
          description: Time taken for this provider call in milliseconds
        error:
          type: ["string", "null"]
          description: Error message if the provider call failed
        sampleUrls:
          type: array
          items:
            type: string
          description: First 10 image URLs returned by the provider

    ImageSearchResult:
      type: object
      required: [lineNumber, lineText, query, images, provider]
      properties:
        lineNumber:
          type: integer
        lineText:
          type: string
        query:
          type: string
          description: The English search query actually used
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageResult"
        provider:
          type: string
          description: Primary provider used (or "multi" if merged)
        totalResults:
          type: integer
        analysis:
          $ref: "#/components/schemas/ScriptLineAnalysis"
        providerDebug:
          type: array
          items:
            $ref: "#/components/schemas/ProviderDebugInfo"
          description: Per-provider debug information for each search call

    ImageSettings:
      type: object
      required: [availableProviders, defaultProvider]
      properties:
        availableProviders:
          type: array
          items:
            type: string
          description: List of configured providers (auto, google, unsplash, pixabay, pexels)
        defaultProvider:
          type: string
        maxPerPage:
          type: integer
